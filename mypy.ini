[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_any_generics = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

[mypy.plugins.numpy.*]
ignore_missing_imports = True

[mypy.plugins.google.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-google_auth_oauthlib.*]
ignore_missing_imports = True

[mypy-markdown.*]
ignore_missing_imports = True

[mypy-pptx.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

# --- Quarantined legacy / alternate-path modules -----------------------------------------
# These pre-date the coherence work and carry GENUINE latent bugs that mypy correctly flags
# (real signature mismatches, not type nitpicks) in code paths with little/no test coverage —
# e.g. the legacy `--service enhanced` translator calls TranslationModel.translate() with the
# wrong arguments; web/app + cli call update_slides()/extract_text() with missing args; the
# legacy core.translator references a non-existent config.CLAUDE_API_KEY. "Type-fixing" these
# blind would silently change behaviour in untested code, so they are quarantined here (mypy's
# documented incremental-adoption pattern) pending a dedicated bugfix + typing pass. The
# coherence feature code (pptx/contract, jsonl, verify, translator, extractor + config +
# native_slides) and the shared utils are fully type-clean and NOT ignored.
# TODO(typing): fix the latent bugs in these modules and remove the ignores.
[mypy-ai_deck_translator.pptx.enhanced.translator]
ignore_errors = True

[mypy-ai_deck_translator.pptx.enhanced_translation_service]
ignore_errors = True

[mypy-ai_deck_translator.core.base_translation_service]
ignore_errors = True

[mypy-ai_deck_translator.core.translator]
ignore_errors = True

[mypy-ai_deck_translator.pptx.pptx_adapter]
ignore_errors = True

[mypy-ai_deck_translator.web.app]
ignore_errors = True

[mypy-ai_deck_translator.cli.main]
ignore_errors = True 