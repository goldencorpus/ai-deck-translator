name: Lint

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 ai_deck_translator --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ai_deck_translator --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    - name: Check formatting with black
      run: |
        black --check ai_deck_translator
    - name: Check import order with isort
      run: |
        isort --check-only --profile black ai_deck_translator
    - name: Type check with mypy
      run: |
        mypy ai_deck_translator
